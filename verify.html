<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign in — CardAlerts</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%231a56db'/%3E%3Cpath d='M16 7c-3.3 0-6 2.7-6 6v4l-2 3v1h16v-1l-2-3v-4c0-3.3-2.7-6-6-6zm-2.5 15a2.5 2.5 0 005 0h-5z' fill='white'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;700&family=Instrument+Sans:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
<main class="legal" style="text-align:center; padding-top: 12vh;">
  <h1 id="title">Almost signed in</h1>
  <p id="msg" style="max-width: 46ch; margin: 16px auto 24px; color: #93a1bb;">
    This sign-in link is meant to open in the <strong style="color:#e6ecf7">CardAlerts app</strong> on your phone.
  </p>
  <p id="cta" style="display:none; margin: 0 auto 24px;">
    <a id="openBtn" href="#" style="display:inline-block; background:#1a56db; color:#fff; text-decoration:none; font-weight:600; font-size:17px; padding:16px 34px; border-radius:12px;">Open CardAlerts</a>
  </p>
  <p id="hint" style="max-width: 46ch; margin: 0 auto 24px; color: #93a1bb; display:none;">
    If nothing happens, make sure CardAlerts is installed on this phone, then tap the button again.
  </p>
  <p style="font-size: 14px; color: #5d6b87;">
    Sign-in links expire after 1 hour and work only once.
  </p>
</main>
<script>
  (function () {
    var qs = window.location.search || '';
    var hasCode = /[?&](oobCode|link)=/.test(qs);
    if (!hasCode) return; // no credentials in URL: keep the informational text

    // Relaunch into the app via its private scheme — no link verification needed
    var target = 'cardalerts://verify' + qs;
    document.getElementById('title').textContent = 'Finish signing in';
    document.getElementById('msg').innerHTML =
      'Tap the button below to finish signing in to the <strong style="color:#e6ecf7">CardAlerts app</strong>.';
    var btn = document.getElementById('openBtn');
    btn.href = target;
    document.getElementById('cta').style.display = 'block';
    document.getElementById('hint').style.display = 'block';

    // Also try automatically (some browsers require the user gesture; the button covers that)
    setTimeout(function () { window.location.href = target; }, 350);
  })();
</script>
</body>
</html>
